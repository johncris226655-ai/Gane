<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISA CHECKER - PROJECT X</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --pitch: #111;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            height: 100%; width: 100%;
            overflow: hidden;
        }

        /* --- OLD TV EFFECT (NOT SHAKY) --- */
        .tv-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 10;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none; z-index: 11;
        }

        /* --- INVISIBLE BUTTONS --- */
        #fs-trigger { position: absolute; top: 0; left: 0; width: 50px; height: 50px; z-index: 100; cursor: pointer; }
        #settings-trigger { position: absolute; top: 0; right: 0; width: 50px; height: 50px; z-index: 100; cursor: pointer; }

        /* --- SETTINGS PANEL --- */
        #settings-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20,20,20,0.95); border: 1px solid #444; padding: 20px;
            z-index: 1000; display: none; width: 80%;
        }

        /* --- MAIN DISPLAY --- */
        #content {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }

        .player-info { margin-bottom: 30px; opacity: 0.8; }
        .player-name { font-size: 1.8rem; letter-spacing: 5px; text-transform: uppercase; }
        .player-id { font-size: 0.9rem; color: #888; }

        /* --- VISA SPADES --- */
        .visa-container { display: flex; gap: 20px; margin: 20px 0; }
        .spade-icon {
            width: 80px; height: 100px;
            background: #fff;
            clip-path: polygon(50% 0%, 100% 70%, 75% 70%, 75% 100%, 25% 100%, 25% 70%, 0% 70%);
            transition: opacity 1s ease-in-out, transform 0.5s ease;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }
        .spade-off { opacity: 0.1 !important; transform: scale(0.9); }

        .status-text { margin-top: 40px; font-size: 0.8rem; letter-spacing: 2px; color: #555; }

        /* --- SEARCH BOX --- */
        #search-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 50;
        }
        input {
            background: transparent; border: none; border-bottom: 2px solid #333;
            color: #fff; font-size: 2rem; text-align: center; outline: none; width: 200px;
        }
    </style>
</head>
<body>

<div class="tv-overlay"></div>
<div class="vignette"></div>

<div id="fs-trigger" onclick="goFullScreen()"></div>
<div id="settings-trigger" onclick="toggleSettings()"></div>

<div id="settings-panel">
    <h3>FILM SETTINGS</h3>
    <label>VISA COUNT (1-3):</label><br>
    <input type="number" id="set-visa" value="3" min="1" max="3" style="font-size: 1rem; width: 50px;"><br><br>
    <label>DELAY (SECONDS):</label><br>
    <input type="number" id="set-delay" value="2" min="0" style="font-size: 1rem; width: 50px;"><br><br>
    <button onclick="saveSettings()" style="padding: 10px; width: 100%;">CONFIRM & APPLY</button>
</div>

<div id="search-screen">
    <p style="font-size: 0.7rem; letter-spacing: 3px;">ENTER PLAYER CODE</p>
    <input type="text" id="code-input" maxlength="5" placeholder="00000">
    <button onclick="startSearch()" style="margin-top: 20px; background: none; border: 1px solid #444; color: #fff; padding: 10px 30px;">SEARCH</button>
</div>

<div id="content" style="visibility: hidden;">
    <div class="player-info">
        <div class="player-name" id="display-name">PLAYER NAME</div>
        <div class="player-id" id="display-id">ID: 00000</div>
    </div>

    <div class="visa-container" id="visa-box">
        <div class="spade-icon" id="s1"></div>
        <div class="spade-icon" id="s2"></div>
        <div class="spade-icon" id="s3"></div>
    </div>

    <div class="status-text" id="remaining-text">3 VISA REMAINING</div>
</div>

<script>
    let currentVisa = 3;
    let animDelay = 2;

    function goFullScreen() {
        let doc = window.document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
    }

    function toggleSettings() {
        let panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        currentVisa = document.getElementById('set-visa').value;
        animDelay = document.getElementById('set-delay').value;
        toggleSettings();
        applyVisaChanges(); // Apply immediately
    }

    function startSearch() {
        const code = document.getElementById('code-input').value;
        if(code.length < 5) return;

        document.getElementById('search-screen').style.display = 'none';
        document.getElementById('content').style.visibility = 'visible';
        document.getElementById('display-id').innerText = "ID: " + code;
        
        // Simulan ang delay animation base sa settings
        setTimeout(() => {
            applyVisaChanges();
        }, 500);
    }

    function applyVisaChanges() {
        const spades = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
        const statusTxt = document.getElementById('remaining-text');
        
        // Reset state
        spades.forEach(s => s.classList.remove('spade-off'));

        // Delay process
        setTimeout(() => {
            spades.forEach((s, index) => {
                if (index >= currentVisa) {
                    s.classList.add('spade-off');
                }
            });
            statusTxt.innerText = currentVisa + " VISA REMAINING";
            announce(currentVisa);
        }, animDelay * 1000);
    }

    function announce(count) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = count + " VISA REMAINING";
        msg.lang = 'en-US'; 
        msg.rate = 0.8; // Mabagal para magmukhang AI
        msg.pitch = 0.5; // Malalim na boses

        // Subukan i-set sa Japanese accent kung available sa browser
        const voices = window.speechSynthesis.getVoices();
        const jpVoice = voices.find(v => v.lang.includes('ja'));
        if(jpVoice) msg.voice = jpVoice;

        window.speechSynthesis.speak(msg);
    }

    // Load voices
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>

</body>
</html>
